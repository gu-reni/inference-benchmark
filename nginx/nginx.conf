events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream cpp_backend {
        server cpp-backend:8080;
    }

    upstream python_backend {
        server python-backend:8081;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;

        # 静态资源直接转发到前端容器
        location ~* \.(json|txt|css|js|ico|svg|png|jpg|jpeg|gif|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API 路由
        location /api/cpp/ {
            proxy_pass http://cpp_backend/api/;
            proxy_set_header Host $host;
            client_max_body_size 20M;
        }

        location /api/python/ {
            proxy_pass http://python_backend/api/;
            proxy_set_header Host $host;
            client_max_body_size 20M;
        }

        # 默认路由（前端页面）
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}